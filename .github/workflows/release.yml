name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release -j$(nproc)

      - name: Unit Tests
        run: cd build && ctest --output-on-failure

      - name: E2E Test (FAT32)
        run: python3 tests/e2e_fat32.py

      - name: Package
        run: |
          cd build
          tar czf salvage-linux-x86_64.tar.gz salvage

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: salvage-linux
          path: build/salvage-linux-x86_64.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Unit Tests
        run: cd build && ctest --output-on-failure -C Release

      - name: E2E Test (FAT32)
        run: python tests/e2e_fat32.py

      - name: E2E Test (NTFS)
        run: python tests/e2e_ntfs.py

      - name: Package
        run: |
          cd build/Release
          7z a ../../salvage-windows-x86_64.zip salvage.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: salvage-windows
          path: salvage-windows-x86_64.zip

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/salvage-linux/salvage-linux-x86_64.tar.gz
            artifacts/salvage-windows/salvage-windows-x86_64.zip
